<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>检测记录 - 垃圾分类系统</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
button, input, select, textarea { appearance: none; -webkit-appearance: none; }

body {
  font-family: 'Noto Sans SC', -apple-system, sans-serif;
  background: #f5f5f5;
  color: #333;
  min-height: 100vh;
}

.top-bar {
  background: white;
  border-bottom: 1px solid #e8e8e8;
  padding: 0 40px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.site-name {
  font-family: 'Noto Serif SC', serif;
  font-size: 1.3rem;
  font-weight: 600;
  color: #333;
  text-decoration: none;
  letter-spacing: 2px;
}
.site-name span { color: #4caf50; }

.main-nav { display: flex; gap: 4px; }
.main-nav a {
  color: #999;
  text-decoration: none;
  padding: 7px 18px;
  border-radius: 6px;
  font-size: 0.9rem;
  transition: all 0.2s;
}
.main-nav a:hover { background: #f1f8e9; color: #4caf50; }
.main-nav a.now { background: #4caf50; color: white; }

.page-wrap {
  max-width: 960px;
  margin: 0 auto;
  padding: 28px 32px;
}

.box {
  background: white;
  border-radius: 10px;
  box-shadow: 0 1px 8px rgba(0,0,0,0.05);
  padding: 24px;
  border: 1px solid #f0f0f0;
}

.box-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid #f0f0f0;
}

.box-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 1.05rem;
  font-weight: 600;
  color: #333;
}

.total-tip {
  font-size: 0.85rem;
  color: #999;
}

.filter-row {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
}

.filter-btn {
  padding: 7px 16px;
  border: 1px solid #ddd;
  background: white;
  color: #888;
  border-radius: 6px;
  font-size: 0.84rem;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
}
.filter-btn:hover { border-color: #4caf50; color: #4caf50; }
.filter-btn.on { background: #4caf50; border-color: #4caf50; color: white; }

.record-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  min-height: 120px;
}

.record-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 16px;
  border-radius: 8px;
  background: #f9f9f9;
  transition: all 0.2s;
  border: 1px solid transparent;
  animation: fadeIn 0.3s ease backwards;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.record-row:hover {
  background: white;
  border-color: #e8e8e8;
  box-shadow: 0 1px 6px rgba(0,0,0,0.05);
  transform: translateY(-1px);
}

.record-row.warn {
  background: #fff8f8;
  border-color: #ffcdd2;
}

.type-icon {
  width: 42px;
  height: 42px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  background: #e8f5e9;
}

.type-icon svg {
  width: 20px;
  height: 20px;
  fill: none;
  stroke-width: 2;
}

.record-row.warn .type-icon { background: #ffebee; }
.record-row:not(.warn) .type-icon svg { stroke: #4caf50; }
.record-row.warn .type-icon svg { stroke: #f44336; }

.rec-content { flex: 1; min-width: 0; }
.rec-title { font-size: 0.92rem; font-weight: 500; margin-bottom: 2px; }
.rec-meta  { font-size: 0.82rem; color: #999; }

.rec-right { text-align: right; flex-shrink: 0; }

.status-tag {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 4px;
  font-size: 0.78rem;
  font-weight: 500;
  margin-bottom: 4px;
}
.tag-warn { background: #ffebee; color: #f44336; }
.tag-ok   { background: #e8f5e9; color: #4caf50; }

.rec-time { font-size: 0.8rem; color: #bbb; }

.empty-box {
  text-align: center;
  padding: 60px 20px;
  color: #ccc;
}
.empty-box p { font-size: 0.92rem; margin-top: 10px; }

/* 分页 */
.page-bar {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
  margin-top: 20px;
  padding-top: 16px;
  border-top: 1px solid #f0f0f0;
}

.pg-btn {
  padding: 6px 14px;
  border: 1px solid #ddd;
  background: white;
  color: #555;
  border-radius: 5px;
  font-size: 0.84rem;
  cursor: pointer;
  transition: all 0.2s;
}
.pg-btn:hover:not(:disabled) { border-color: #4caf50; color: #4caf50; }
.pg-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.pg-btn.on { background: #4caf50; border-color: #4caf50; color: white; }

.pg-info { font-size: 0.84rem; color: #999; }

/* 加载 */
.spin-wrap {
  text-align: center;
  padding: 40px;
  color: #bbb;
  font-size: 0.88rem;
}
.mini-spin {
  width: 28px;
  height: 28px;
  margin: 0 auto 8px;
  border: 2px solid #e8f5e9;
  border-top-color: #4caf50;
  border-radius: 50%;
  animation: turn 0.8s linear infinite;
}
@keyframes turn { to { transform: rotate(360deg); } }

@media(max-width: 768px) {
  .top-bar { padding: 0 16px; }
  .page-wrap { padding: 16px; }
}
</style>
</head>
<body>

<header class="top-bar">
  <a class="site-name" href="/">社区<span>垃圾</span>分类</a>
  <nav class="main-nav">
    <a href="/">首页</a>
    <a href="/detection">智慧分类检测</a>
    <a href="/alerts" class="now">记录</a>
    <a href="/statistics">统计</a>
  </nav>
</header>

<div class="page-wrap">
  <div class="box">
    <div class="box-head">
      <h2 class="box-title">检测记录</h2>
      <span class="total-tip" id="total-tip"></span>
    </div>

    <div class="filter-row">
      <button class="filter-btn on" onclick="changeFilter(this, 'all')">全部</button>
      <button class="filter-btn" onclick="changeFilter(this, 'warning')">仅预警</button>
      <button class="filter-btn" onclick="changeFilter(this, 'normal')">仅正常</button>
    </div>

    <div class="record-list" id="record-list">
      <div class="spin-wrap"><div class="mini-spin"></div>正在加载...</div>
    </div>

    <div class="page-bar" id="page-bar" style="display:none;">
      <button class="pg-btn" id="btn-prev" onclick="goPage(curPage - 1)">上一页</button>
      <span class="pg-info" id="pg-info"></span>
      <button class="pg-btn" id="btn-next" onclick="goPage(curPage + 1)">下一页</button>
    </div>
  </div>
</div>

<script>
var curFilter = 'all';
var curPage = 1;
var perPage = 15;
var totalRecords = 0;

var typeLabel = {
  'fire':     '检测到火情',
  'smoke':    '检测到烟雾',
  'overflow': '检测到垃圾溢出',
  'warning':  '检测到异常',
  'normal':   '检测正常'
};

function changeFilter(btn, val) {
  document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('on'); });
  btn.classList.add('on');
  curFilter = val;
  curPage = 1;
  loadData();
}

function goPage(n) {
  if (n < 1 || n > Math.ceil(totalRecords / perPage)) return;
  curPage = n;
  loadData();
}

function loadData() {
  var list = document.getElementById('record-list');
  list.innerHTML = '<div class="spin-wrap"><div class="mini-spin"></div>加载中...</div>';

  var filterParam = '';
  if (curFilter === 'warning') filterParam = '&status=warning';
  if (curFilter === 'normal')  filterParam = '&status=normal';

  fetch('/api/alerts?page=' + curPage + '&per_page=' + perPage + filterParam)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      totalRecords = data.total;
      renderList(data.records);
      renderPage(data.total, data.page, data.per_page);
    })
    .catch(function() {
      list.innerHTML = '<div class="empty-box"><p>加载失败，请刷新页面重试</p></div>';
    });
}

function renderList(records) {
  var list = document.getElementById('record-list');
  document.getElementById('total-tip').textContent = '共 ' + totalRecords + ' 条记录';

  if (!records || records.length === 0) {
    list.innerHTML =
      '<div class="empty-box">' +
        '<svg viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="#ddd" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>' +
        '<p>暂无记录</p>' +
      '</div>';
    return;
  }

  list.innerHTML = records.map(function(r, i) {
    var isWarn = r.status !== 'normal';
    var title = typeLabel[r.status] || '检测记录';
    var meta = '';
    if (r.types && r.types.length) {
      meta = r.types.join('、');
    } else {
      meta = '未检测到异常';
    }
    if (r.total !== undefined) meta += ' · 共' + r.total + '个目标';

    var iconPath = isWarn
      ? '<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>'
      : '<polyline points="20 6 9 17 4 12"/>';

    var timeStr = r.time || '';

    return '<div class="record-row ' + (isWarn ? 'warn' : '') + '" style="animation-delay:' + (i * 0.04) + 's">' +
      '<div class="type-icon"><svg viewBox="0 0 24 24">' + iconPath + '</svg></div>' +
      '<div class="rec-content">' +
        '<div class="rec-title">' + title + '</div>' +
        '<div class="rec-meta">' + meta + '</div>' +
      '</div>' +
      '<div class="rec-right">' +
        '<span class="status-tag ' + (isWarn ? 'tag-warn' : 'tag-ok') + '">' + (isWarn ? '预警' : '正常') + '</span>' +
        '<div class="rec-time">' + timeStr + '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function renderPage(total, page, pp) {
  var bar = document.getElementById('page-bar');
  var totalPages = Math.ceil(total / pp);
  if (totalPages <= 1) {
    bar.style.display = 'none';
    return;
  }
  bar.style.display = 'flex';
  document.getElementById('pg-info').textContent = '第 ' + page + ' / ' + totalPages + ' 页';
  document.getElementById('btn-prev').disabled = page <= 1;
  document.getElementById('btn-next').disabled = page >= totalPages;
}

loadData();
</script>

</body>
</html>
